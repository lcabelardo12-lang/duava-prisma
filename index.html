<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DUAVA PRISMA</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D6A4F">
    <style>
        body{font-family:sans-serif;background:#F5F5F5;margin:0;padding:20px}
        h1{color:#2D6A4F}
        .producto{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .error{background:#FFE0E0;color:#C00;padding:20px;border-radius:10px;margin:20px 0}
    </style>
</head>
<body>
    <h1>DUAVA PRISMA</h1>
    <p>La Habana · Holguín · Cuba</p>
    <div id="contenido"><p>Cargando productos...</p></div>

    <script>
        alert('PASO 1: Script iniciado');

        var SHEET_ID = '10JZz_unbXlJvpryJ5r6QVktdlvIvRBhqOqWaa3SliGU';
        var GID_CAT = '1078512593';

        alert('PASO 2: IDs configurados');

        var x = new XMLHttpRequest();
        x.open('GET', 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=' + GID_CAT, true);

        alert('PASO 3: XMLHttpRequest creado');

        x.onload = function() {
            alert('PASO 4: Datos recibidos. Status: ' + x.status);
            if (x.status === 200) {
                alert('PASO 5: Status 200 OK');
                var lineas = x.responseText.split('\n');
                alert('PASO 6: Lineas separadas: ' + lineas.length);
                var html = '';
                for (var i = 1; i < lineas.length; i++) {
                    var datos = lineas[i].split(',');
                    if (datos[1]) {
                        html += '<div class="producto"><strong>' + datos[1] + '</strong></div>';
                    }
                }
                alert('PASO 7: Productos procesados');
                document.getElementById('contenido').innerHTML = html || '<p>No se encontraron productos</p>';
                alert('PASO 8: EXITO - Productos mostrados');
            } else {
                document.getElementById('contenido').innerHTML = '<div class="error">Error HTTP: ' + x.status + '</div>';
                alert('ERROR: Status diferente a 200');
            }
        };

        x.onerror = function() {
            document.getElementById('contenido').innerHTML = '<div class="error">Error de conexion</div>';
            alert('ERROR: No se pudo conectar');
        };

        alert('PASO 9: Enviando peticion...');
        x.send();
        alert('PASO 10: Peticion enviada. Esperando respuesta...');
    </script>
</body>
</html>
