<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Prueba</title></head>
<body>
<h2>Probando conexión...</h2>
<div id="resultado">Cargando...</div>

<script>
var ID = '10JZz_unbXlJvpryJ5r6QVktdlvIvRBhqOqWaa3SliGU';
var GID = '1078512593';

var x = new XMLHttpRequest();
x.open('GET', 'https://docs.google.com/spreadsheets/d/' + ID + '/export?format=csv&gid=' + GID, true);
x.onload = function() {
    if (x.status === 200) {
        var lineas = x.responseText.split('\n');
        var html = '<p>OK - Encontrados ' + (lineas.length-1) + ' productos:</p><ul>';
        for (var i = 1; i < lineas.length; i++) {
            var datos = lineas[i].split(',');
            if (datos[1]) html += '<li>' + datos[1] + '</li>';
        }
        html += '</ul>';
        document.getElementById('resultado').innerHTML = html;
    } else {
        document.getElementById('resultado').innerHTML = 'Error: ' + x.status;
    }
};
x.onerror = function() {
    document.getElementById('resultado').innerHTML = 'Error al conectar con Google Sheets';
};
x.send();
</script>
</body>
</html>
